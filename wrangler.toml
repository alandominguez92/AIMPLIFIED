name = "aimplified"
compatibility_date = "2024-11-01"
main = "worker.js"

# Serve the repo's static files, and route anything that isn't a file (i.e.
# /api/*) to the Worker in worker.js. ODDS_API_KEY is set as a Worker secret
# in the dashboard (or .dev.vars locally) — never committed.
[assets]
directory = "."
binding = "ASSETS"

# Track record storage (Cloudflare D1). Create the database, paste its id below,
# and redeploy — see DEPLOY.md. Until this is set up, env.DB is undefined and the
# track-record endpoint returns empty (the site shows its placeholder record).
# [[d1_databases]]
# binding = "DB"
# database_name = "aimplified"
# database_id = "PASTE_YOUR_D1_DATABASE_ID_HERE"
